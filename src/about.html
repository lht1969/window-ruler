<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>关于 Window Ruler</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
                color: #f8fafc;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
            }

            .about-container {
                background: rgba(15, 23, 42, 0.9);
                backdrop-filter: blur(20px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 16px;
                padding: 32px;
                max-width: 360px;
                width: 100%;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            }

            .about-header {
                text-align: center;
                margin-bottom: 24px;
            }

            .about-icon {
                width: 72px;
                height: 72px;
                margin: 0 auto 16px;
                background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
                border-radius: 16px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
            }

            .about-icon svg {
                width: 48px;
                height: 48px;
            }

            .about-title {
                font-size: 1.5rem;
                font-weight: 700;
                color: #f8fafc;
                margin-bottom: 4px;
            }

            .about-subtitle {
                font-size: 0.875rem;
                color: #94a3b8;
            }

            .about-info {
                background: rgba(255, 255, 255, 0.04);
                border-radius: 12px;
                padding: 16px;
                margin-bottom: 20px;
            }

            .info-row {
                display: flex;
                justify-content: space-between;
                padding: 8px 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            }

            .info-row:last-child {
                border-bottom: none;
            }

            .info-label {
                color: #94a3b8;
                font-size: 0.875rem;
            }

            .info-value {
                color: #f8fafc;
                font-size: 0.875rem;
                font-weight: 500;
            }

            .info-value a {
                color: #3b82f6;
                text-decoration: none;
                transition: color 0.15s ease;
            }

            .info-value a:hover {
                color: #60a5fa;
                text-decoration: underline;
            }

            .about-desc {
                font-size: 0.8125rem;
                color: #94a3b8;
                line-height: 1.7;
                text-align: center;
                margin-bottom: 24px;
            }

            .about-footer {
                text-align: center;
                padding-top: 16px;
                border-top: 1px solid rgba(255, 255, 255, 0.06);
            }

            .close-btn {
                background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
                color: #ffffff;
                border: none;
                padding: 12px 32px;
                font-size: 0.875rem;
                font-weight: 600;
                border-radius: 8px;
                cursor: pointer;
                transition:
                    transform 0.15s ease,
                    box-shadow 0.15s ease;
                font-family: inherit;
            }

            .close-btn:hover {
                transform: translateY(-1px);
                box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
            }

            .close-btn:active {
                transform: translateY(0);
            }

            .close-btn:focus-visible {
                outline: 2px solid #93c5fd;
                outline-offset: 2px;
            }
        </style>
    </head>

    <body>
        <div class="about-container">
            <div class="about-header">
                <div class="about-icon">
                    <svg
                        viewBox="0 0 48 48"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                    >
                        <rect
                            x="8"
                            y="8"
                            width="32"
                            height="32"
                            rx="4"
                            fill="white"
                            opacity="0.2"
                        />
                        <rect
                            x="14"
                            y="18"
                            width="20"
                            height="3"
                            rx="1.5"
                            fill="white"
                        />
                        <rect
                            x="14"
                            y="25"
                            width="16"
                            height="3"
                            rx="1.5"
                            fill="white"
                            opacity="0.7"
                        />
                        <rect
                            x="14"
                            y="32"
                            width="18"
                            height="3"
                            rx="1.5"
                            fill="white"
                            opacity="0.5"
                        />
                    </svg>
                </div>
                <h1 class="about-title">Window Ruler</h1>
                <p class="about-subtitle">屏幕量尺工具</p>
            </div>

            <div class="about-info">
                <div class="info-row">
                    <span class="info-label">版本</span>
                    <span class="info-value">0.1.0</span>
                </div>
                <div class="info-row">
                    <span class="info-label">版权</span>
                    <span class="info-value">© 2026</span>
                </div>
                <div class="info-row">
                    <span class="info-label">协议</span>
                    <span class="info-value">MIT License</span>
                </div>
                <div class="info-row">
                    <span class="info-label">仓库</span>
                    <span class="info-value">
                        <a
                            href="https://github.com/lht1969/window-ruler"
                            target="_blank"
                            rel="noopener"
                            >GitHub</a
                        >
                    </span>
                </div>
                <div class="info-row">
                    <span class="info-label">框架</span>
                    <span class="info-value">Tauri v2 + Rust</span>
                </div>
            </div>

            <p class="about-desc">
                一款简洁高效的 Windows
                屏幕量尺工具，支持矩形测量、十字线像素测量，支持一键保存数据、截屏和双坐标系切换。
            </p>

            <div class="about-footer">
                <button id="btn-close" class="close-btn" aria-label="关闭">
                    确定
                </button>
            </div>
        </div>

        <script type="module">
            const { getCurrentWindow } = window.__TAURI__.window;

            document
                .getElementById("btn-close")
                .addEventListener("click", async () => {
                    const win = getCurrentWindow();
                    await win.close();
                });
        </script>
    </body>
</html>
