<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="rect-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <filter id="rect-glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="48" height="48" fill="rgba(15, 23, 42, 0.9)"/>
  
  <g transform="translate(8, 8)">
    <rect x="2" y="2" width="28" height="28" rx="2" fill="none" stroke="url(#rect-gradient)" stroke-width="2" filter="url(#rect-glow)"/>
    <rect x="6" y="6" width="20" height="20" rx="1" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3 2"/>
    
    <!-- 从左上角到右下角的蓝色虚线 -->
    <line x1="2" y1="2" x2="30" y2="30" stroke="url(#rect-gradient)" stroke-width="2" stroke-dasharray="4 2"/>
    
    <g fill="url(#rect-gradient)">
      <rect x="2" y="2" width="6" height="6" rx="1"/>
      <rect x="24" y="2" width="6" height="6" rx="1"/>
      <rect x="2" y="24" width="6" height="6" rx="1"/>
      <rect x="24" y="24" width="6" height="6" rx="1"/>
    </g>
  </g>
</svg>
