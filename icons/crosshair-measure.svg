<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="crosshair-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="48" height="48" fill="rgba(15, 23, 42, 0.9)"/>
  
  <g transform="translate(8, 8)">
    <!-- 紫色方框（虚线） -->
    <rect x="2" y="2" width="28" height="28" rx="2" fill="none" stroke="url(#crosshair-gradient)" stroke-width="2" stroke-dasharray="4 2"/>
    
    <!-- 内部十字线（虚线，更明显） -->
    <g stroke="#c084fc" stroke-width="2.5" stroke-dasharray="5 3" fill="none">
      <line x1="16" y1="4" x2="16" y2="28"/>
      <line x1="4" y1="16" x2="28" y2="16"/>
    </g>
    
    <!-- 中心小点 -->
    <circle cx="16" cy="16" r="3" fill="url(#crosshair-gradient)"/>
  </g>
</svg>
