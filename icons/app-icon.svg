<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="128" height="128" fill="url(#bg-gradient)" rx="16"/>

  <g transform="translate(12, 12)">
    <!-- 主外框 - 扩大至 104x104，充分利用空间 -->
    <rect x="0" y="0" width="104" height="104" rx="10"
          fill="none"
          stroke="url(#accent-gradient)"
          stroke-width="6"/>

    <!-- 中心十字线 -->
    <line x1="52" y1="0" x2="52" y2="104"
          stroke="url(#accent-gradient)"
          stroke-width="5"/>
    <line x1="0" y1="52" x2="104" y2="52"
          stroke="url(#accent-gradient)"
          stroke-width="5"/>

    <!-- 四个角的实心方块 -->
    <rect x="48" y="0" width="8" height="8" rx="1" fill="url(#accent-gradient)"/>
    <rect x="48" y="96" width="8" height="8" rx="1" fill="url(#accent-gradient)"/>
    <rect x="0" y="48" width="8" height="8" rx="1" fill="url(#accent-gradient)"/>
    <rect x="96" y="48" width="8" height="8" rx="1" fill="url(#accent-gradient)"/>
    <rect x="48" y="48" width="8" height="8" rx="1" fill="url(#accent-gradient)"/>

    <!-- 内部虚线方框 - 保持适当比例 -->
    <rect x="20" y="20" width="64" height="64" rx="6"
          fill="none"
          stroke="#93c5fd"
          stroke-width="4"
          stroke-dasharray="8 5"/>
    <rect x="26" y="26" width="52" height="52" rx="3"
          fill="none"
          stroke="#93c5fd"
          stroke-width="3"
          stroke-dasharray="6 4"/>
  </g>
</svg>